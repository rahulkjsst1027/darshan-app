<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open App</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f2f2f2;
            font-family: Arial;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #28a745;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            margin: 10px;
            display: inline-block;
        }

        .reload-btn {
            background-color: #007bff;
        }
    </style>
</head>
<body>

    <!-- Open App Button -->
    <a class="btn" 
       href="https://play.google.com/store/apps/details?id=com.android.chrome"
       target="_blank">
       Open App 11
    </a>
	
	<a href="https://rahulkjsst1027.github.io/darshan-app/darshan-app.html" target="_blank">
   Open in Browser
   </a>
   <a href="#" onclick="openBrowser()">Open in Browser</a>


    <!-- Reload Button -->
    <button class="btn reload-btn" onclick="reloadPage()">
        Reload Page
    </button>

    <script>
	function openBrowser() {
    var url = "https://rahulkjsst1027.github.io/darshan-app/darshan-app.html";

    // Try external open
    var win = window.open(url, "_system");

    // fallback
    if (!win) {
        window.location.href = url;
    }
}
        function reloadPage() {
            location.reload(); // 🔄 reload current page
        }
    </script>

</body>
</html>
