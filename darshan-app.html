<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open App</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f2f2f2;
            font-family: Arial;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <button class="btn" onclick="openApp()">Open App</button>

    <script>
        function isInAppBrowser() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;

            return (
                ua.includes("FBAN") || 
                ua.includes("FBAV") || 
                ua.includes("Instagram") || 
                ua.includes("ShareChat") ||
                ua.includes("wv") // Android WebView
            );
        }

        function openApp() {
            var playStoreUrl = "https://play.google.com/store/apps/details?id=com.android.chrome";

            // ⚠️ In-app browser (ShareChat etc.) me direct Play Store open
            if (isInAppBrowser()) {
                window.location.href = playStoreUrl;
                return;
            }

            // 🚀 Try intent (browser me fast open)
            var intentUrl = "intent://details?id=com.android.chrome#Intent;scheme=market;package=com.android.vending;end;";

            window.location.href = intentUrl;

            // ⏳ Fallback (agar intent fail ho)
            setTimeout(function () {
                window.location.href = playStoreUrl;
            }, 1200);
        }
    </script>

</body>
</html>
