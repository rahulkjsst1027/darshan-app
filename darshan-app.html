<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open App</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f2f2f2;
            font-family: Arial;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #28a745;
            color: white;
            border-radius: 10px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- 🔥 No JS, direct anchor -->
    <a class="btn" 
       href="https://play.google.com/store/apps/details?id=com.android.chrome"
       target="_blank">
       Open App 3
    </a>

</body>
</html>
