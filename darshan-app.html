<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open App</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f2f2f2;
            font-family: Arial;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button class="btn" onclick="openApp()">Open App 2</button>

    <script>
        var clicked = false;

        function openApp() {
            if (clicked) return; // 🔥 double click / double redirect stop
            clicked = true;

            var url = "https://play.google.com/store/apps/details?id=com.android.chrome";

            // 🔥 BEST: replace instead of href
            window.location.replace(url);
        }
    </script>

</body>
</html>
