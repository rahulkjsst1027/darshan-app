<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open App</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f2f2f2;
            font-family: Arial;
        }

        .btn {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <button class="btn" onclick="openApp()">Open App</button>

    <script>
        function openApp() {
            // 👉 Yaha apna Play Store URL daal
            window.location.href = "https://play.google.com/store/apps/details?id=com.android.chrome";
        }
    </script>

</body>
</html>
